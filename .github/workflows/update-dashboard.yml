name: Update Dashboard

on:
  schedule:
    - cron: '0 21 * * *'  # 7am AEST Brisbane daily
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r propertyme-automation/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Write secrets to files
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python3 -c "
          import os
          open('propertyme-automation/credentials.json', 'w').write(os.environ['GOOGLE_CREDENTIALS'])
          "

      - name: Download PropertyMe reports
        env:
          PROPERTYME_EMAIL: ${{ secrets.PROPERTYME_EMAIL }}
          PROPERTYME_PASSWORD: ${{ secrets.PROPERTYME_PASSWORD }}
          PROPERTYME_TOTP_SECRET: ${{ secrets.PROPERTYME_TOTP_SECRET }}
        run: python propertyme-automation/download_reports.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: propertyme-automation/debug_*.png
          if-no-files-found: ignore

      - name: Verify downloaded files
        run: |
          echo "=== Files in propertyme-automation/downloads/ ==="
          find propertyme-automation/downloads -name "*.pdf" -o -name "*.xlsx" 2>/dev/null || echo "(none found)"
          # Fail loudly if the monthly rent Excel is missing — catches silent download failures
          if ! ls propertyme-automation/downloads/monthly_rent_*.xlsx 1>/dev/null 2>&1; then
            echo "ERROR: monthly_rent_*.xlsx not found in downloads/ — PropertyMe download failed!"
            exit 1
          fi
          echo "Monthly rent file confirmed present."

      - name: Process data and push to Google Sheets
        env:
          XERO_CLIENT_ID: ${{ secrets.XERO_CLIENT_ID }}
          XERO_CLIENT_SECRET: ${{ secrets.XERO_CLIENT_SECRET }}
          XERO_REFRESH_TOKEN: ${{ secrets.XERO_REFRESH_TOKEN }}
          ROTATION_PAT: ${{ secrets.ROTATION_PAT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python propertyme-automation/process_and_push.py

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build dashboard
        run: npm run build

      - name: Commit and push dashboard update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ public/
          git commit -m "Dashboard update $(date +%Y-%m-%d)" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Dmacb1apps/cpm-propertyme-dashboard.git
      - name: Sync contacts to Google Contacts
        env:
          PROPERTYME_EMAIL: ${{ secrets.PROPERTYME_EMAIL }}
          PROPERTYME_PASSWORD: ${{ secrets.PROPERTYME_PASSWORD }}
          PROPERTYME_TOTP_SECRET: ${{ secrets.PROPERTYME_TOTP_SECRET }}
          GOOGLE_CONTACTS_CLIENT_ID: ${{ secrets.GOOGLE_CONTACTS_CLIENT_ID }}
          GOOGLE_CONTACTS_CLIENT_SECRET: ${{ secrets.GOOGLE_CONTACTS_CLIENT_SECRET }}
          GOOGLE_CONTACTS_REFRESH_TOKEN: ${{ secrets.GOOGLE_CONTACTS_REFRESH_TOKEN }}
        run: |
          cd propertyme-automation
          python sync_contacts.py
          python sync_contacts.py
